name: Follow Upstream Releases
on:
  workflow_dispatch:
  schedule:
    - cron: "10 4 */1 * *" # Every 24 hours at 4:10 AM

jobs:
  update_on_new_release:
    name: Update .spec file on new release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch the latest upstream version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/Traciges/Ayuz/releases/latest | jq -r '.tag_name // empty' | sed 's/^v//')
          if [ -z "$LATEST_VERSION" ]; then
            echo "No tag_name found in upstream response; nothing to do."
            exit 0
          fi
          echo "Latest Ayuz release: $LATEST_VERSION"
          echo "LATEST_VERSION=$LATEST_VERSION" >> $GITHUB_ENV

      - name: Check for new upstream release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGED_VERSION=$(grep -E '^Version:\s*\S*\s*$' ayuz.spec | awk '{print $2}')
          echo "Latest RPM package release: $PACKAGED_VERSION"
          echo "PACKAGED_VERSION=$PACKAGED_VERSION" >> $GITHUB_ENV

      - name: Check for new upstream release
        run: |
          if [ "$LATEST_VERSION" != "$PACKAGED_VERSION" ]; then
            echo "New release available."
            echo "NEW_RELEASE=true" >> $GITHUB_ENV
          else
            echo "Already on the latest release; nothing to do."
            echo "NEW_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Update SPEC on new release
        if: env.NEW_RELEASE == 'true'
        run: |
          echo "Updating ayuz.spec..."
          sed -i -E "s/^Version:(\s*)\S*\s*$/Version:\1$LATEST_VERSION/" ayuz.spec
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ayuz.spec
          git commit -m "Update to $LATEST_VERSION"
          git push
